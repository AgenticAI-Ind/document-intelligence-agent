version: '3.8'

services:
  # FastAPI Application
  api:
    build: .
    container_name: document-intelligence-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  chroma_data:
